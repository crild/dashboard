    async function loadConfigFromCloud() {
      const input = document.getElementById('share-load-code').value.trim();
      const result = document.getElementById('share-load-result');
      if (!input) return;

      // Extract code from full URL or use as-is
      let code = input;
      if (input.includes('?config=')) {
        code = input.split('?config=')[1].split('&')[0];
      }

      result.textContent = 'Loading...';
      try {
        const res = await fetch(WORKER_BASE + '/config/load?code=' + encodeURIComponent(code));
        if (!res.ok) {
          result.textContent = 'Config not found. Check the code and try again.';
          result.style.color = 'var(--negative)';
          return;
        }
        const cfg = await res.json();

        // Apply widget order if present
        if (cfg._widgetOrder) {
          localStorage.setItem('dashboard-widget-order', JSON.stringify(cfg._widgetOrder));
          delete cfg._widgetOrder;
        }
        // Apply theme if present
        if (cfg._theme) {
          localStorage.setItem('dashboard-theme', cfg._theme);
          delete cfg._theme;
        }
        // Apply layout if present
        if (cfg._layout) {
          localStorage.setItem('dashboard-layout', JSON.stringify(cfg._layout));
          delete cfg._layout;
        }

        localStorage.setItem('dashboard-config', JSON.stringify(cfg));
        closeSharePanel();
        showToast('Setup loaded! Refreshing...');
        setTimeout(() => window.location.reload(), 1000);
      } catch (e) {
        result.textContent = 'Failed to load config.';
        result.style.color = 'var(--negative)';
      }
    }

    function exportConfig() {
      const cfg = loadConfig() || {};
      const order = localStorage.getItem('dashboard-widget-order');
      if (order) cfg._widgetOrder = JSON.parse(order);
      cfg._theme = localStorage.getItem('dashboard-theme') || 'dark';
      const layoutData = localStorage.getItem('dashboard-layout');
      if (layoutData) cfg._layout = JSON.parse(layoutData);
      const blob = new Blob([JSON.stringify(cfg, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'dashboard-config.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Config exported');
    }

    function importConfig(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const cfg = JSON.parse(e.target.result);
          if (cfg._widgetOrder) {
            localStorage.setItem('dashboard-widget-order', JSON.stringify(cfg._widgetOrder));
            delete cfg._widgetOrder;
          }
          if (cfg._theme) {
            localStorage.setItem('dashboard-theme', cfg._theme);
            delete cfg._theme;
          }
          if (cfg._layout) {
            localStorage.setItem('dashboard-layout', JSON.stringify(cfg._layout));
            delete cfg._layout;
          }
          localStorage.setItem('dashboard-config', JSON.stringify(cfg));
          showToast('Config imported! Refreshing...');
          setTimeout(() => window.location.reload(), 1000);
        } catch (err) {
          showToast('Invalid config file');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // Auto-load config from URL on page load
    (function loadFromURL() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('config');
      if (!code) return;
      fetch(WORKER_BASE + '/config/load?code=' + encodeURIComponent(code))
        .then(res => { if (res.ok) return res.json(); throw new Error(); })
        .then(cfg => {
          if (cfg._widgetOrder) {
            localStorage.setItem('dashboard-widget-order', JSON.stringify(cfg._widgetOrder));
            delete cfg._widgetOrder;
          }
          if (cfg._theme) {
            localStorage.setItem('dashboard-theme', cfg._theme);
            delete cfg._theme;
          }
          if (cfg._layout) {
            localStorage.setItem('dashboard-layout', JSON.stringify(cfg._layout));
            delete cfg._layout;
          }
          localStorage.setItem('dashboard-config', JSON.stringify(cfg));
          // Remove ?config= from URL and reload
          window.history.replaceState({}, '', window.location.pathname);
          window.location.reload();
        })
        .catch(() => {});
    })();

    // Close search dropdowns when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) {
        document.querySelectorAll('.search-results').forEach(el => el.classList.remove('visible'));
      }
    });

    // ── Layout Settings ──
    function getLayoutConfig() {
      const saved = localStorage.getItem('dashboard-layout');
      if (saved) return JSON.parse(saved);
      return { columns: 2, spacing: 'comfortable', width: 'default' };
    }

    function saveLayoutConfig(cfg) {
      localStorage.setItem('dashboard-layout', JSON.stringify(cfg));
    }

    function applyLayoutConfig() {
      const cfg = getLayoutConfig();
      const grid = document.querySelector('.grid');
      const container = document.querySelector('.container');
      if (!grid || !container) return;

      // Columns
      grid.classList.remove('cols-2', 'cols-3', 'cols-4');
      grid.classList.add('cols-' + cfg.columns);

      // Spacing
      grid.classList.remove('spacing-compact', 'spacing-comfortable', 'spacing-spacious');
      grid.classList.add('spacing-' + cfg.spacing);

      // Width
      container.classList.remove('width-narrow', 'width-default', 'width-wide', 'width-full');
      container.classList.add('width-' + cfg.width);
    }

    function openLayoutSettings() {
      const cfg = getLayoutConfig();
      const popup = document.getElementById('widget-popup');
      const overlay = document.getElementById('widget-popup-overlay');

      function colIcon(n) {
        let bars = '';
        for (let i = 0; i < n; i++) bars += '<div class="layout-choice-bar"></div>';
        return '<div class="layout-choice-icon">' + bars + '</div>';
      }

      popup.innerHTML = `
        <h3>Layout Settings</h3>

        <div class="layout-option-group">
          <label>Columns</label>
          <div class="layout-choices">
            <button class="layout-choice${cfg.columns === 2 ? ' selected' : ''}" onclick="setLayoutOption('columns', 2, this)">
              ${colIcon(2)}2
            </button>
            <button class="layout-choice${cfg.columns === 3 ? ' selected' : ''}" onclick="setLayoutOption('columns', 3, this)">
              ${colIcon(3)}3
            </button>
            <button class="layout-choice${cfg.columns === 4 ? ' selected' : ''}" onclick="setLayoutOption('columns', 4, this)">
              ${colIcon(4)}4
            </button>
          </div>
        </div>

        <div class="layout-option-group">
          <label>Spacing</label>
          <div class="layout-choices">
            <button class="layout-choice${cfg.spacing === 'compact' ? ' selected' : ''}" onclick="setLayoutOption('spacing', 'compact', this)">Compact</button>
            <button class="layout-choice${cfg.spacing === 'comfortable' ? ' selected' : ''}" onclick="setLayoutOption('spacing', 'comfortable', this)">Comfortable</button>
            <button class="layout-choice${cfg.spacing === 'spacious' ? ' selected' : ''}" onclick="setLayoutOption('spacing', 'spacious', this)">Spacious</button>
          </div>
        </div>

        <div class="layout-option-group">
          <label>Page width</label>
          <div class="layout-choices">
            <button class="layout-choice${cfg.width === 'narrow' ? ' selected' : ''}" onclick="setLayoutOption('width', 'narrow', this)">Narrow</button>
            <button class="layout-choice${cfg.width === 'default' ? ' selected' : ''}" onclick="setLayoutOption('width', 'default', this)">Default</button>
            <button class="layout-choice${cfg.width === 'wide' ? ' selected' : ''}" onclick="setLayoutOption('width', 'wide', this)">Wide</button>
            <button class="layout-choice${cfg.width === 'full' ? ' selected' : ''}" onclick="setLayoutOption('width', 'full', this)">Full</button>
          </div>
        </div>

        <div class="widget-popup-actions">
          <button class="btn" onclick="resetLayout()" style="margin-right:auto;font-size:0.78rem;color:var(--text-secondary);">Reset to default</button>
          <button class="btn" onclick="closeWidgetPopup()">Close</button>
        </div>`;

      overlay.classList.add('open');
    }

    function setLayoutOption(key, value, btn) {
      const cfg = getLayoutConfig();
      cfg[key] = value;
      saveLayoutConfig(cfg);
      applyLayoutConfig();
      applyAdaptiveLayout();

      // Update selected state in the group
      const group = btn.closest('.layout-choices');
      group.querySelectorAll('.layout-choice').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

    function resetLayout() {
      localStorage.removeItem('dashboard-layout');
      applyLayoutConfig();
      applyAdaptiveLayout();
      closeWidgetPopup();
      showToast('Layout reset to default');
    }

    // Apply layout on load
    applyLayoutConfig();

    // ── Adaptive Grid Layout ──
    function applyAdaptiveLayout() {
      const grid = document.querySelector('.grid');
      if (!grid) return;
      const cards = Array.from(grid.querySelectorAll('.card[data-widget]'));
      const smallWidgets = new Set(['clock', 'weather', 'sensors', 'hue', 'power']);
      const mediumWidgets = new Set(['stocks', 'news', 'transit']);
      const layoutCfg = getLayoutConfig();
      const cols = layoutCfg.columns;

      // Clear previous layout spans
      cards.forEach(c => {
        c.classList.remove('span-full', 'span-half', 'span-2', 'span-3');
      });

      if (cols === 4) {
        // 4 columns: small = 1 col, medium = 2 cols
        cards.forEach(c => {
          if (mediumWidgets.has(c.dataset.widget)) {
            c.classList.add('span-2');
          }
        });
      } else if (cols === 3) {
        // 3 columns: small = 1 col, medium = 2 cols
        cards.forEach(c => {
          if (mediumWidgets.has(c.dataset.widget)) {
            c.classList.add('span-2');
          }
        });
      } else {
        // 2 columns: pair small widgets, medium/wide take full
        let i = 0;
        while (i < cards.length) {
          const card = cards[i];
          const isSmall = smallWidgets.has(card.dataset.widget);
          const next = cards[i + 1];
          const nextIsSmall = next ? smallWidgets.has(next.dataset.widget) : false;

          if (isSmall && next && nextIsSmall) {
            card.classList.add('span-half');
            next.classList.add('span-half');
            i += 2;
          } else if (!isSmall) {
            card.classList.add('span-full');
            i += 1;
          } else {
            card.classList.add('span-full');
            i += 1;
          }
        }
      }
    }

    // Run layout on load and resize
    applyAdaptiveLayout();
    window.addEventListener('resize', applyAdaptiveLayout);

    // ── Drag and Drop Reordering ──
    (function initDragAndDrop() {
      const grid = document.querySelector('.grid');
      let draggedCard = null;
      let dragOverCard = null;
      let touchStartY = 0;
      let touchStartX = 0;
      let isDraggingTouch = false;
      let touchClone = null;
      let touchScrollInterval = null;

      // Restore saved order on page load
      function restoreOrder() {
        const saved = localStorage.getItem('dashboard-widget-order');
        if (!saved) return;
        try {
          const order = JSON.parse(saved);
          const cards = Array.from(grid.querySelectorAll('.card[data-widget]'));
          const cardMap = {};
          cards.forEach(c => { cardMap[c.dataset.widget] = c; });
          order.forEach(widgetName => {
            const card = cardMap[widgetName];
            if (card) grid.appendChild(card);
          });
        } catch (e) {}
      }

      function saveOrder() {
        const cards = Array.from(grid.querySelectorAll('.card[data-widget]'));
        const order = cards.map(c => c.dataset.widget);
        localStorage.setItem('dashboard-widget-order', JSON.stringify(order));
        applyAdaptiveLayout();
      }

      // Make card headers draggable
      function setupCard(card) {
        const header = card.querySelector('.card-header');
        if (!header) return;
        card.setAttribute('draggable', 'true');

        // Prevent drag when clicking buttons/inputs inside header
        header.addEventListener('mousedown', (e) => {
          if (e.target.closest('button, input, select, a')) {
            card.setAttribute('draggable', 'false');
          } else {
            card.setAttribute('draggable', 'true');
          }
        });

        // HTML5 Drag events
        card.addEventListener('dragstart', (e) => {
          if (e.target !== card) return;
          draggedCard = card;
          card.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', card.dataset.widget);
        });

        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          grid.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
          if (draggedCard) {
            saveOrder();
            draggedCard = null;
          }
        });

        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (!draggedCard || draggedCard === card) return;
          grid.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
          card.classList.add('drag-over');
          dragOverCard = card;
        });

        card.addEventListener('dragleave', () => {
          card.classList.remove('drag-over');
        });

        card.addEventListener('drop', (e) => {
          e.preventDefault();
          card.classList.remove('drag-over');
          if (!draggedCard || draggedCard === card) return;
          const cards = Array.from(grid.querySelectorAll('.card[data-widget]'));
          const dragIdx = cards.indexOf(draggedCard);
          const dropIdx = cards.indexOf(card);
          if (dragIdx < dropIdx) {
            card.after(draggedCard);
          } else {
            card.before(draggedCard);
          }
        });

        // Touch events for mobile
        header.addEventListener('touchstart', (e) => {
          if (e.target.closest('button, input, select, a')) return;
          const touch = e.touches[0];
          touchStartX = touch.clientX;
          touchStartY = touch.clientY;
          isDraggingTouch = false;
          draggedCard = card;
        }, { passive: true });

        header.addEventListener('touchmove', (e) => {
          if (!draggedCard || draggedCard !== card) return;
          const touch = e.touches[0];
          const dx = Math.abs(touch.clientX - touchStartX);
          const dy = Math.abs(touch.clientY - touchStartY);

          if (!isDraggingTouch && (dx > 10 || dy > 10)) {
            isDraggingTouch = true;
            card.classList.add('dragging');

            // Create floating clone
            touchClone = card.cloneNode(true);
            touchClone.style.position = 'fixed';
            touchClone.style.zIndex = '1000';
            touchClone.style.width = card.offsetWidth + 'px';
            touchClone.style.pointerEvents = 'none';
            touchClone.style.opacity = '0.85';
            touchClone.style.transform = 'scale(1.03)';
            touchClone.style.boxShadow = '0 8px 32px rgba(0,0,0,0.25)';
            document.body.appendChild(touchClone);
          }

          if (isDraggingTouch) {
            e.preventDefault();
            const cardRect = card.getBoundingClientRect();
            touchClone.style.left = cardRect.left + 'px';
            touchClone.style.top = (touch.clientY - cardRect.height / 2) + 'px';

            // Auto-scroll near edges
            clearInterval(touchScrollInterval);
            if (touch.clientY < 80) {
              touchScrollInterval = setInterval(() => window.scrollBy(0, -8), 16);
            } else if (touch.clientY > window.innerHeight - 80) {
              touchScrollInterval = setInterval(() => window.scrollBy(0, 8), 16);
            }

            // Find card under touch
            grid.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over'));
            const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
            const targetCard = elemBelow?.closest('.card[data-widget]');
            if (targetCard && targetCard !== card) {
              targetCard.classList.add('drag-over');
              dragOverCard = targetCard;
            }
          }
        }, { passive: false });

        header.addEventListener('touchend', () => {
          clearInterval(touchScrollInterval);
          if (isDraggingTouch && draggedCard && dragOverCard && draggedCard !== dragOverCard) {
            const cards = Array.from(grid.querySelectorAll('.card[data-widget]'));
            const dragIdx = cards.indexOf(draggedCard);
            const dropIdx = cards.indexOf(dragOverCard);
            if (dragIdx < dropIdx) {
              dragOverCard.after(draggedCard);
            } else {
              dragOverCard.before(draggedCard);
            }
            saveOrder();
          }
          if (touchClone) {
            touchClone.remove();
            touchClone = null;
          }
          grid.querySelectorAll('.card').forEach(c => c.classList.remove('dragging', 'drag-over'));
          draggedCard = null;
          dragOverCard = null;
          isDraggingTouch = false;
        });
      }

      // Set up all cards
      grid.querySelectorAll('.card[data-widget]').forEach(setupCard);
      restoreOrder();
      applyAdaptiveLayout();
    })();
  </script>
</body>
</html>
